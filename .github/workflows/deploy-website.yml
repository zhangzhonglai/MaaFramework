name: deploy-maafw.com

on:
    push:
        tags:
            - "v*"

    workflow_dispatch:

jobs:
    deploy:
        if: ${{ github.repository_owner == 'MaaXYZ' }}
        runs-on: ubuntu-latest
        env:
            GH_TOKEN: ${{ secrets.MaaFwDocsDeploy }}
        steps:
            - run: |
                  gh workflow --repo MaaXYZ/MaaFrameworkWebsite run deploy.yml
